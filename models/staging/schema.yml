version: 2

sources:
  - name: football_raw
    schema: main
    tables:
      - name: raw_matches
      - name: raw_teams
      - name: raw_players
      - name: raw_referees
      - name: raw_venues

models:
  - name: stg_matches
    columns: 
      - name: match_id
        tests:
          - not_null
          - unique
      - name: home_team
        tests:
          - not_null 
      - name: away_team
        tests:
          - not_null
      - name: venue
        tests:
          - not_null
      - name: match_date
        tests:
          - not_null
      - name: kickoff_time
        tests:
          - not_null
      - name: gameweek
        tests: 
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 38
      - name: home_goals
        tests: 
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 15
      - name: away_goals
        tests: 
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 15
      - name: referee
        tests: 
          - not_null

  - name: stg_players
    columns: 
      - name: player_id
        tests:
          - not_null
          - unique
      - name: player_name
        tests: 
          - not_null
      - name: nationality
        tests: 
          - not_null
      - name: position
        tests: 
          - not_null
          - accepted_values:
              arguments:
                values: ['Goalkeeper', 'Defender', 'Midfielder', 'Forward']
      - name: current_team
        tests:
          - not_null
      - name: date_of_birth
        tests:
          - not_null
  - name: stg_referees
    columns: 
      - name: referee_id
        tests:
          - not_null
          - unique 
      - name: referee_name
        tests:
          - not_null
      - name: nationality
        tests:
          - not_null
  - name: stg_teams
    columns: 
      - name: team_id
        tests: 
          - not_null
          - unique
      - name: team_name
        tests: 
          - not_null
      - name: city
        tests:
          - not_null
      - name: founded_year
        tests:
          - not_null
  - name: stg_venues
    columns:  
      - name: venue_id
        tests: 
          - not_null
          - unique 
      - name: venue_name
        tests: 
          - not_null
      - name: city
        tests:
          - not_null
      - name: capacity
        tests:
          - not_null
      - name: surface
        tests: 
          - not_null
          - accepted_values:
              arguments:
                values: ['grass', 'artificial']